name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          set -euo pipefail
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm \
            git \
            base-devel \
            python \
            python-build \
            python-installer \
            python-wheel \
            python-setuptools

      - name: Create non-root build user
        run: |
          set -euo pipefail
          useradd --create-home --uid 1001 builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build package
        id: build
        env:
          CACHYPORT_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          runuser -u builder -- env \
            CACHYPORT_TAG="$CACHYPORT_TAG" \
            GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            bash -lc '
            set -euo pipefail
            cd "$GITHUB_WORKSPACE/build"
            CACHYPORT_TAG="$CACHYPORT_TAG" makepkg --cleanbuild --noconfirm
            shopt -s nullglob
            pkg_files=()
            for file in ./*.pkg.tar.*; do
              [[ "$file" == *.sig ]] && continue
              pkg_files+=("$file")
            done
            if (( ${#pkg_files[@]} == 0 )); then
              echo "No package artifact was produced" >&2
              exit 1
            fi
            pkg_file="${pkg_files[0]}"
            sha256sum "$pkg_file" > SHA256SUMS
            sha512sum "$pkg_file" > SHA512SUMS
            echo "${pkg_file#./}" > .package_name
          '
          pkg_file="$(cat build/.package_name)"
          {
            echo "package_file=${pkg_file#./}"
            echo "sha256_file=SHA256SUMS"
            echo "sha512_file=SHA512SUMS"
          } >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          tag = os.environ["TAG"]

          def api(path: str, data: dict | None = None):
              url = f"https://api.github.com{path}"
              body = None
              if data is not None:
                  body = json.dumps(data).encode("utf-8")
              req = urllib.request.Request(
                  url,
                  data=body,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "cachyport-release-workflow",
                  },
                  method="POST" if data is not None else "GET",
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          tags = api(f"/repos/{repo}/tags?per_page=100")
          previous = None
          for item in tags:
              name = item.get("name")
              if name and name != tag:
                  previous = name
                  break

          payload = {"tag_name": tag, "target_commitish": "main"}
          if previous:
              payload["previous_tag_name"] = previous

          notes = api(f"/repos/{repo}/releases/generate-notes", payload)
          body = notes.get("body", "").strip()
          with open("build/CHANGELOG.md", "w", encoding="utf-8") as fh:
              if body:
                  fh.write(body + "\n")
              else:
                  fh.write("No notable changes were detected for this tag.\n")
          PY

      - name: Create release notes
        run: |
          set -euo pipefail
          cd build
          {
            echo "## cachyport ${GITHUB_REF_NAME}"
            echo
            echo "Native Arch Linux package built from tag ${GITHUB_REF_NAME}."
            echo
            echo "### What's New"
            cat CHANGELOG.md
            echo
            echo "### Artifacts"
            echo "- `${{ steps.build.outputs.package_file }}`"
            echo "- `${{ steps.build.outputs.sha256_file }}`"
            echo "- `${{ steps.build.outputs.sha512_file }}`"
            echo
            echo "### SHA256"
            echo '```text'
            cat SHA256SUMS
            echo '```'
            echo
            echo "### SHA512"
            echo '```text'
            cat SHA512SUMS
            echo '```'
          } > RELEASE_NOTES.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          append_body: false
          overwrite_files: true
          body_path: build/RELEASE_NOTES.md
          files: |
            build/${{ steps.build.outputs.package_file }}
            build/${{ steps.build.outputs.sha256_file }}
            build/${{ steps.build.outputs.sha512_file }}
